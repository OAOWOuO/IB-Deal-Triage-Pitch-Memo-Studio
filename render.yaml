services:
  - type: web
    name: ib-deal-triage-pitch-memo-studio
    runtime: node
    plan: free
    region: oregon
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: SEC_USER_AGENT
        value: "IB Deal Triage Pitch Memo Studio/1.0 (https://github.com/OAOWOuO/IB-Deal-Triage-Pitch-Memo-Studio; contact=OAOWOuO)"
